    <script>
        function updateNavigation() {
            const token = localStorage.getItem('authToken');
            const userData = localStorage.getItem('userData');

            const loginLink = document.getElementById('loginLink');
            const signupLink = document.getElementById('signupLink');
            const userInfo = document.getElementById('userInfo');
            const logoutLink = document.getElementById('logoutLink');
            const userNameLink = document.getElementById('userNameLink');

            const mobileLoginLink = document.getElementById('mobileLoginLink');
            const mobileSignupLink = document.getElementById('mobileSignupLink');
            const mobileUserInfo = document.getElementById('mobileUserInfo');
            const mobileLogoutLink = document.getElementById('mobileLogoutLink');
            const mobileUserNameLink = document.getElementById('mobileUserNameLink');

            if (token && userData) {
                const user = JSON.parse(userData);
                const userName = user.full_name || user.email.split('@')[0];

                if (loginLink) loginLink.style.display = 'none';
                if (signupLink) signupLink.style.display = 'none';
                if (mobileLoginLink) mobileLoginLink.style.display = 'none';
                if (mobileSignupLink) mobileSignupLink.style.display = 'none';

                if (userInfo) userInfo.style.display = 'block';
                if (logoutLink) logoutLink.style.display = 'block';
                if (mobileUserInfo) mobileUserInfo.style.display = 'block';
                if (mobileLogoutLink) mobileLogoutLink.style.display = 'block';

                if (userNameLink) userNameLink.textContent = userName;
                if (mobileUserNameLink) mobileUserNameLink.textContent = userName;
            } else {
                if (loginLink) loginLink.style.display = 'block';
                if (signupLink) signupLink.style.display = 'block';
                if (mobileLoginLink) mobileLoginLink.style.display = 'block';
                if (mobileSignupLink) mobileSignupLink.style.display = 'block';

                if (userInfo) userInfo.style.display = 'none';
                if (logoutLink) logoutLink.style.display = 'none';
                if (mobileUserInfo) mobileUserInfo.style.display = 'none';
                if (mobileLogoutLink) mobileLogoutLink.style.display = 'none';
            }
        }

        function handleLogout(event) {
            event.preventDefault();
            localStorage.removeItem('authToken');
            localStorage.removeItem('userData');
            localStorage.removeItem('cart');
            updateNavigation();
            updateCartCount();
            window.location.href = '/';
        }

        const hamburger = document.querySelector('.hamburger');
        const mobileMenu = document.querySelector('.mobile-menu');
        if (hamburger && mobileMenu) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
                document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
            });

            document.querySelectorAll('.mobile-menu a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                    document.body.style.overflow = '';
                });
            });
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountEl = document.querySelector('.cart-count');
            if (cartCountEl) {
                cartCountEl.textContent = totalItems;
                cartCountEl.style.display = totalItems > 0 ? 'flex' : 'none';
            }
        }

        updateNavigation();
        updateCartCount();
        window.addEventListener('storage', updateCartCount);
    </script>
